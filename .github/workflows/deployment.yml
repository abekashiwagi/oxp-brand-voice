name: Deployment

on:
  workflow_dispatch:
  push:
    branches: 
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      # Required before uses: ./.github/actions/... — the runner must have action.yml on disk.
      - uses: actions/checkout@v4
      - name: Deploy to Staging
        # Local composite action: entrata/deploy-microfrontend@main cannot use secrets.* inside action.yml (GitHub limitation).
        uses: ./.github/actions/deploy-microfrontend
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: dev
          REGION: "us-east-1"
          ACCOUNT_ID: 388604198110
          S3_BUCKET: "388604198110-oxp-prototype"
          STACK: "staging"
          ROLE_ARN: "arn:aws:iam::388604198110:role/oxp-prototype-github-actions-role"
          MICROFRONTEND_NAME: "oxp-prototype"
          # CUSTOM_VARS: |
          #   {
          #     "NODE_ENV": "development"
          #   }
  
